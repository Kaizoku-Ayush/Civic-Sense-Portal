<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="botGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#EF4444" />
    </linearGradient>
  </defs>

  <!-- Bot head/body - rounded rectangle -->
  <rect x="20" y="30" width="60" height="55" rx="18" fill="url(#botGradient)" />
  
  <!-- Antenna -->
  <circle cx="50" cy="22" r="4" fill="url(#accentGradient)" />
  <rect x="48.5" y="22" width="3" height="8" fill="url(#accentGradient)" rx="1.5" />
  
  <!-- Eyes -->
  <circle cx="38" cy="48" r="6" fill="white" />
  <circle cx="62" cy="48" r="6" fill="white" />
  
  <!-- Eye pupils -->
  <circle cx="38" cy="48" r="3.5" fill="#1E293B" />
  <circle cx="62" cy="48" r="3.5" fill="#1E293B" />
  
  <!-- Shine in eyes -->
  <circle cx="39.5" cy="46.5" r="1.5" fill="white" opacity="0.8" />
  <circle cx="63.5" cy="46.5" r="1.5" fill="white" opacity="0.8" />
  
  <!-- Smile/chat interface -->
  <rect x="32" y="65" width="36" height="12" rx="6" fill="white" opacity="0.95" />
  
  <!-- Chat dots inside mouth -->
  <circle cx="40" cy="71" r="2" fill="url(#botGradient)" opacity="0.7" />
  <circle cx="50" cy="71" r="2" fill="url(#botGradient)" opacity="0.7" />
  <circle cx="60" cy="71" r="2" fill="url(#botGradient)" opacity="0.7" />
  
  <!-- Side panels/ears -->
  <rect x="12" y="45" width="6" height="16" rx="3" fill="url(#accentGradient)" opacity="0.9" />
  <rect x="82" y="45" width="6" height="16" rx="3" fill="url(#accentGradient)" opacity="0.9" />
  
  <!-- Detail lines on ears -->
  <rect x="13.5" y="49" width="3" height="1.5" rx="0.75" fill="white" opacity="0.6" />
  <rect x="13.5" y="52" width="3" height="1.5" rx="0.75" fill="white" opacity="0.6" />
  <rect x="13.5" y="55" width="3" height="1.5" rx="0.75" fill="white" opacity="0.6" />
  
  <rect x="83.5" y="49" width="3" height="1.5" rx="0.75" fill="white" opacity="0.6" />
  <rect x="83.5" y="52" width="3" height="1.5" rx="0.75" fill="white" opacity="0.6" />
  <rect x="83.5" y="55" width="3" height="1.5" rx="0.75" fill="white" opacity="0.6" />
</svg>
