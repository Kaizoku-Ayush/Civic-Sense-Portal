<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#EF4444" />
    </linearGradient>
    <linearGradient id="roadGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
  </defs>

  <!-- Location pin outer shape -->
  <path d="M 50 10 C 35 10 23 22 23 37 C 23 45 26 52 35 65 L 50 85 L 65 65 C 74 52 77 45 77 37 C 77 22 65 10 50 10 Z" fill="url(#pinGradient)" />
  
  <!-- Inner circle - white background for city elements -->
  <circle cx="50" cy="37" r="18" fill="white" />
  
  <!-- Stylized city grid/map inside -->
  <g opacity="0.85">
    <!-- Horizontal roads -->
    <rect x="38" y="28" width="24" height="2" fill="url(#roadGradient)" rx="1" />
    <rect x="38" y="36" width="24" height="2" fill="url(#roadGradient)" rx="1" />
    <rect x="38" y="44" width="24" height="2" fill="url(#roadGradient)" rx="1" />
    
    <!-- Vertical roads -->
    <rect x="44" y="23" width="2" height="28" fill="url(#roadGradient)" rx="1" />
    <rect x="54" y="23" width="2" height="28" fill="url(#roadGradient)" rx="1" />
    
    <!-- Building blocks in grid -->
    <rect x="39" y="24" width="4" height="3" fill="#3B82F6" opacity="0.4" rx="0.5" />
    <rect x="47" y="24" width="6" height="3" fill="#3B82F6" opacity="0.5" rx="0.5" />
    <rect x="57" y="24" width="4" height="3" fill="#3B82F6" opacity="0.4" rx="0.5" />
    
    <rect x="39" y="31" width="4" height="4" fill="#8B5CF6" opacity="0.5" rx="0.5" />
    <rect x="47" y="30" width="6" height="5" fill="#8B5CF6" opacity="0.6" rx="0.5" />
    <rect x="57" y="31" width="4" height="4" fill="#8B5CF6" opacity="0.5" rx="0.5" />
    
    <rect x="39" y="39" width="4" height="4" fill="#3B82F6" opacity="0.4" rx="0.5" />
    <rect x="47" y="39" width="6" height="4" fill="#3B82F6" opacity="0.5" rx="0.5" />
    <rect x="57" y="39" width="4" height="4" fill="#3B82F6" opacity="0.4" rx="0.5" />
    
    <rect x="39" y="47" width="4" height="3" fill="#8B5CF6" opacity="0.4" rx="0.5" />
    <rect x="47" y="46" width="6" height="4" fill="#8B5CF6" opacity="0.5" rx="0.5" />
    <rect x="57" y="47" width="4" height="3" fill="#8B5CF6" opacity="0.4" rx="0.5" />
  </g>
  
  <!-- Alert/attention dot in center -->
  <circle cx="50" cy="37" r="4" fill="url(#centerGradient)" />
  <circle cx="50" cy="37" r="2.5" fill="white" />
  <circle cx="50" cy="37" r="1.5" fill="url(#centerGradient)" />
</svg>
