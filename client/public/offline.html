<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're offline – Civic Sense Portal</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f9fafb;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 1.25rem;
        padding: 3rem 2rem;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 1px 3px rgba(0,0,0,.08);
      }
      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 1.5rem;
        background: #eef2ff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg { width: 36px; height: 36px; color: #4f46e5; }
      h1 { font-size: 1.375rem; font-weight: 700; color: #111827; margin-bottom: .5rem; }
      p { font-size: .9rem; color: #6b7280; line-height: 1.6; margin-bottom: 1.75rem; }
      .btn {
        display: inline-block;
        padding: .65rem 1.75rem;
        background: #4f46e5;
        color: #fff;
        font-size: .9rem;
        font-weight: 600;
        border-radius: .625rem;
        text-decoration: none;
        border: none;
        cursor: pointer;
        transition: background .15s;
      }
      .btn:hover { background: #4338ca; }
      .status {
        margin-top: 1.5rem;
        font-size: .75rem;
        color: #9ca3af;
      }
      .dot {
        display: inline-block;
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #ef4444;
        margin-right: 5px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .3; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>
        No internet connection detected. Please check your network and try again.
        Previously visited pages may be available from cache.
      </p>
      <button class="btn" onclick="window.location.reload()">Try Again</button>
      <div class="status">
        <span class="dot"></span>No connection
      </div>
    </div>
  </body>
</html>
